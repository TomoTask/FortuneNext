    if(editing==='new'){
      h+=`<tr class="table-row--edit">
        <td><input class="cell-input" id="pe-name" placeholder="商品名"></td>
        <td><input class="cell-input cell-num" id="pe-buy" type="number" placeholder="仕入"></td>
        <td><input class="cell-input cell-num" id="pe-sell" type="number" placeholder="売単価"></td>
        <td>-</td>
        <td><input class="cell-input cell-num" id="pe-qty" type="number" placeholder="数量"></td>
        <td><input class="cell-input" id="pe-dead" type="date"></td>
        <td>下書き</td>
        <td><select class="cell-input" id="pe-link"><option value="">なし</option>${list.map(x=>`<option value="${x.product_id}">${x.name}</option>`).join('')}</select></td>
        <td class="table-acts"><button class="btn btn--primary btn--xs" onclick="AdminPages._saveProduct('new')">登録</button><button class="btn btn--ghost btn--xs" onclick="AdminPages._s.editRow=null;App.renderPage()">✕</button></td>
      </tr>`;
    }
    list.forEach(p=>{
      const isEdit=editing===p.product_id;
      const ln=p.linked_product_id?(list.find(x=>x.product_id===p.linked_product_id)?.name||''):'';
      if(isEdit){
        h+=`<tr class="table-row--edit">
          <td><input class="cell-input" id="pe-name" value="${p.name}"></td>
          <td><input class="cell-input cell-num" id="pe-buy" type="number" value="${p.buy_price}"></td>
          <td><input class="cell-input cell-num" id="pe-sell" type="number" value="${p.base_sell_price||p.sell_price||''}"></td>
          <td class="text-right">${p.remaining_qty}</td>
          <td><input class="cell-input cell-num" id="pe-qty" type="number" value="${p.total_qty}"></td>
          <td><input class="cell-input" id="pe-dead" type="date" value="${p.deadline?p.deadline.substring(0,10):''}"></td>
          <td><select class="cell-input" id="pe-st"><option value="draft"${p.status==='draft'?' selected':''}>下書</option><option value="active"${p.status==='active'?' selected':''}>販売中</option><option value="closed"${p.status==='closed'?' selected':''}>締切</option></select></td>
          <td><select class="cell-input" id="pe-link"><option value="">なし</option>${list.filter(x=>x.product_id!==p.product_id).map(x=>`<option value="${x.product_id}"${p.linked_product_id===x.product_id?' selected':''}>${x.name}</option>`).join('')}</select></td>
          <td class="table-acts"><button class="btn btn--primary btn--xs" onclick="AdminPages._saveProduct('${p.product_id}')">保存</button><button class="btn btn--ghost btn--xs" onclick="AdminPages._s.editRow=null;App.renderPage()">✕</button></td>
        </tr>`;
      }else{
        h+=`<tr onclick="AdminPages._s.editRow='${p.product_id}';App.renderPage()" class="table-row--tap">
          <td class="font-bold">${p.name}${ln?' 🔗':''}</td>
          <td class="text-right">${Fmt.yen(p.buy_price)}</td>
          <td class="text-right">${Fmt.yen(p.base_sell_price||p.sell_price)}</td>
          <td class="text-right">${p.remaining_qty}</td>
          <td class="text-right">${p.total_qty}</td>
          <td class="text-xs">${Fmt.date(p.deadline)}</td>
          <td>${UI.badge(Fmt.productStatus(p.status),Fmt.statusColor(p.status))}</td>
          <td class="text-xs">${ln||'-'}</td>
          <td></td>
        </tr>`;
      }
    });
    h+=`</tbody></table></div>`;
    h+=`<div class="text-xs text-gray mt-1">💡 行をタップして編集</div>`;
    return h;
  },

  async _saveProduct(pid){
    const n=$('#pe-name')?.value?.trim(),bp=Number($('#pe-buy')?.value),sp=Number($('#pe-sell')?.value),
          q=Number($('#pe-qty')?.value),dl=$('#pe-dead')?.value,st=$('#pe-st')?.value,lk=$('#pe-link')?.value||'';
    if(!n){UI.toast('商品名必須','error');return;} if(!bp||bp<=0){UI.toast('仕入必須','error');return;}
    if(!sp||sp<bp){UI.toast('売単価≧仕入','error');return;}
    const r=pid==='new'?await API.createProduct({name:n,buy_price:bp,sell_price:sp,total_qty:q,deadline:dl,linked_product_id:lk})
      :await API.updateProduct({productId:pid,name:n,buy_price:bp,sell_price:sp,status:st,deadline:dl,total_qty:q,linked_product_id:lk});
    if(r?.success){UI.toast('保存しました');this._s.editRow=null;API.clearCache();App.renderPage();}else UI.toast(r?.error||'失敗','error');
  },

  // ── ユーザー（スプレッドシート型） ──
  async renderUsers() {
    const [users,groups]=await Promise.all([API.getUsers(),API.getGroups()]);
    const list=Array.isArray(users)?users:[], gl=Array.isArray(groups)?groups:[];
    const editing=this._s.editRow;
    let h=`<div class="flex-between mb-1"><h2 class="page-title">ユーザー</h2><button class="btn btn--primary btn--sm" onclick="AdminPages._s.editRow='new';App.renderPage()">＋ 新規</button></div>`;
    h+=`<div class="table-wrap"><table class="table table--compact table--edit"><thead><tr><th>名前</th><th>ID</th><th>ロール</th><th>グループ</th><th>残高</th><th>リピ</th><th></th></tr></thead><tbody>`;
    if(editing==='new'){
      h+=`<tr class="table-row--edit">
        <td><input class="cell-input" id="ue-name" placeholder="名前"></td>
        <td><input class="cell-input" id="ue-lid" placeholder="ログインID"></td>
        <td><select class="cell-input" id="ue-role"><option value="user">user</option><option value="leader">leader</option><option value="admin">admin</option></select></td>
        <td><select class="cell-input" id="ue-grp"><option value="">-</option>${gl.map(g=>`<option value="${g.group_id}">${g.name}</option>`).join('')}</select></td>
        <td>-</td>
        <td><input type="checkbox" id="ue-rep"></td>
        <td class="table-acts"><input class="cell-input" id="ue-pw" placeholder="PW" style="width:60px"><button class="btn btn--primary btn--xs" onclick="AdminPages._saveUser('new')">登録</button><button class="btn btn--ghost btn--xs" onclick="AdminPages._s.editRow=null;App.renderPage()">✕</button></td>
      </tr>`;
    }
    list.forEach(u=>{
      const isEdit=editing===u.user_id;
      const gName=gl.find(g=>g.group_id===u.group_id)?.name||u.group_id||'-';
      if(isEdit){
        h+=`<tr class="table-row--edit">
          <td><input class="cell-input" id="ue-name" value="${u.name}"></td>
          <td><input class="cell-input" id="ue-lid" value="${u.login_id}"></td>
          <td><select class="cell-input" id="ue-role"><option value="user"${u.role==='user'?' selected':''}>user</option><option value="leader"${u.role==='leader'?' selected':''}>leader</option><option value="admin"${u.role==='admin'?' selected':''}>admin</option></select></td>
          <td><select class="cell-input" id="ue-grp"><option value="">-</option>${gl.map(g=>`<option value="${g.group_id}"${u.group_id===g.group_id?' selected':''}>${g.name}</option>`).join('')}</select></td>
          <td class="text-right">${u.reinvest_balance>0?Fmt.yen(u.reinvest_balance):'-'}</td>
          <td><input type="checkbox" id="ue-rep"${(u.is_repeater===true||u.is_repeater==='TRUE')?' checked':''}></td>
          <td class="table-acts">
            <button class="btn btn--primary btn--xs" onclick="AdminPages._saveUser('${u.user_id}')">保存</button>
            <button class="btn btn--ghost btn--xs" onclick="AdminPages._s.editRow=null;App.renderPage()">✕</button>
            <button class="btn btn--ghost btn--xs text-red" onclick="AdminPages._deleteUser('${u.user_id}','${u.name}')">削除</button>
          </td>
        </tr>
        <tr class="table-row--edit"><td colspan="7" class="table-sub">
          <div class="flex-between"><span class="text-xs text-gray">PW変更:</span><input class="cell-input" id="ue-npw" placeholder="新PW" style="width:100px"><button class="btn btn--outline btn--xs" onclick="AdminPages._resetPw('${u.user_id}')">変更</button></div>
        </td></tr>`;
      }else{
        h+=`<tr onclick="AdminPages._s.editRow='${u.user_id}';App.renderPage()" class="table-row--tap">
          <td class="font-bold">${u.name}</td>
          <td class="text-xs">${u.login_id}</td>
          <td>${UI.badge(u.role,u.role==='admin'?'red':u.role==='leader'?'blue':'gray')}</td>
          <td class="text-xs">${gName}</td>
          <td class="text-right text-xs">${u.reinvest_balance>0?Fmt.yen(u.reinvest_balance):'-'}</td>
          <td class="text-xs">${(u.is_repeater===true||u.is_repeater==='TRUE')?'✓':''}</td>
          <td></td>
        </tr>`;
      }
    });
    h+=`</tbody></table></div>`;
    h+=`<div class="text-xs text-gray mt-1">💡 行をタップして編集</div>`;
    return h;
  },

  async _saveUser(uid){
    const n=$('#ue-name')?.value?.trim(),lid=$('#ue-lid')?.value?.trim(),em=$('#ue-em')?.value?.trim()||'',
          role=$('#ue-role')?.value,gid=$('#ue-grp')?.value,rep=$('#ue-rep')?.checked;
    if(!n||!lid){UI.toast('名前とID必須','error');return;}
    let r;
    if(uid==='new'){const pw=$('#ue-pw')?.value?.trim();if(!pw||pw.length<4){UI.toast('PW4文字以上','error');return;}r=await API.createUser({name:n,login_id:lid,password:pw,email:em,role,group_id:gid,is_repeater:rep});}
    else r=await API.updateUser({user_id:uid,name:n,login_id:lid,email:em,role,group_id:gid,is_repeater:rep});
    if(r?.success){UI.toast('保存');this._s.editRow=null;API.clearCache();App.renderPage();}else UI.toast(r?.error||'失敗','error');
  },
  async _resetPw(uid){const pw=$('#ue-npw')?.value?.trim();if(!pw||pw.length<4){UI.toast('4文字以上','error');return;}UI.confirm('PW変更？',async()=>{const r=await API.resetPassword(uid,pw);if(r?.success)UI.toast('変更済');else UI.toast(r?.error||'失敗','error');});},
  async _deleteUser(uid,name){UI.confirm(`「${name}」を削除？`,async()=>{const r=await API.deleteUser(uid);if(r?.success){UI.toast('削除');this._s.editRow=null;API.clearCache();App.renderPage();}else UI.toast(r?.error||'失敗','error');});},
  async _downloadIOU(id){if(typeof UserPages._downloadIOU==='function')await UserPages._downloadIOU(id);else UI.toast('PDF不可','error');},

  // ── 設定 ──
  async renderSettings() {
    const s=await API.getSettings(), st=(typeof s==='object'&&!s.error)?s:{};
    let h=`<button class="btn btn--ghost btn--sm mb-1" onclick="App.navigate('home')">← ホーム</button><h2 class="page-title">⚙️ 振込先口座</h2>`;
    if(st.bank_name&&st.bank_number) h+=UI.card(`<div class="text-xs font-bold text-gray mb-05">現在</div>${UI.bankInfo(st)}`);
    h+=UI.card(`
      <div class="form-group"><label class="form-label">銀行名 *</label><input class="input" id="st-bank" value="${st.bank_name||''}"></div>
      <div class="form-group"><label class="form-label">支店名</label><input class="input" id="st-br" value="${st.bank_branch||''}"></div>
      <div class="form-group"><label class="form-label">種類</label><select class="input" id="st-type"><option value="普通"${(st.bank_type||'普通')==='普通'?' selected':''}>普通</option><option value="当座"${st.bank_type==='当座'?' selected':''}>当座</option></select></div>
      <div class="form-group"><label class="form-label">口座番号 *</label><input class="input" id="st-num" value="${st.bank_number||''}" inputmode="numeric"></div>
      <div class="form-group"><label class="form-label">名義</label><input class="input" id="st-hold" value="${st.bank_holder||''}"></div>
      <button class="btn btn--primary btn--full" onclick="AdminPages._saveSt()">保存</button>
    `);
    return h;
  },
  async _saveSt(){
    const bn=$('#st-bank')?.value?.trim(),bb=$('#st-br')?.value?.trim(),bt=$('#st-type')?.value,bnum=$('#st-num')?.value?.trim(),bh=$('#st-hold')?.value?.trim();
    if(!bn||!bnum){UI.toast('銀行名と番号必須','error');return;}
    const r=await API.saveSettings({bank_name:bn,bank_branch:bb,bank_type:bt,bank_number:bnum,bank_holder:bh});
    if(r?.success){UI.toast('保存');API.clearCache();App.renderPage();}else UI.toast(r?.error||'失敗','error');
  },
};

// ── app.js ──
// ═══════════════════════════════════════
//  メインアプリケーション v3.0
// ═══════════════════════════════════════

const App = {
  currentPage: null,
  _loadingCount: 0,

  init() {
    Auth.init();
    if (Auth.isLoggedIn()) {
      this.renderApp();
    } else {
      this.showLogin();
    }
  },

  // ── ローディング ──
  setLoading(on) {
    this._loadingCount += on ? 1 : -1;
    if (this._loadingCount < 0) this._loadingCount = 0;
    const el = $('#global-loading');
    if (el) el.style.display = this._loadingCount > 0 ? 'flex' : 'none';
  },

  // ── ログイン画面 ──
  showLogin() {
    $('#app').innerHTML = `
      <div class="login-screen">
        <div class="login-card">
          <div class="login-logo">出資管理</div>
          <div class="login-subtitle">Investment Management System</div>
          <div id="login-error" class="login-error"></div>
          <div class="form-group">
            <label class="form-label">ログインID</label>
            <input type="text" id="login-id" class="input" placeholder="IDを入力" autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">パスワード</label>
            <input type="password" id="login-pw" class="input" placeholder="パスワードを入力" autocomplete="current-password">
          </div>
          <button id="login-btn" class="btn btn--primary btn--full btn--lg" onclick="App.doLogin()">ログイン</button>
        </div>
      </div>`;
    const pw = $('#login-pw');
    const id = $('#login-id');
    if (pw) pw.addEventListener('keydown', e => { if (e.key === 'Enter') App.doLogin(); });
    if (id) { id.addEventListener('keydown', e => { if (e.key === 'Enter') pw?.focus(); }); id.focus(); }
  },

  async doLogin() {
    const loginId = $('#login-id')?.value?.trim();
    const password = $('#login-pw')?.value?.trim();
    const errEl = $('#login-error');
    const btn = $('#login-btn');

    if (!loginId || !password) {
      if (errEl) { errEl.textContent = 'IDとパスワードを入力してください'; errEl.style.display = 'block'; }
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    const res = await API.login(loginId, password);
    btn.disabled = false;
    btn.textContent = 'ログイン';

    if (res?.success) {
      Auth.setSession(res.token, res.user);
      API.clearCache();
      this.renderApp();
    } else {
      if (errEl) { errEl.textContent = res?.error || 'ログインに失敗しました'; errEl.style.display = 'block'; }
    }
  },

  doLogout() {
    UI.confirm('ログアウトしますか？', async () => {
      await API.logout();
      Auth.clear();
      API.clearCache();
      this.showLogin();
    });
  },

  // ── メインレイアウト ──
  renderApp() {
    const role = Auth.getRole();
    const user = Auth.currentUser;

    $('#app').innerHTML = `
      <div class="app-layout">
        <header class="app-header">
          <div class="app-header__left">
            <div class="app-header__title">出資管理</div>
            <span class="app-header__user">${user.name}${user.group_name ? ' / ' + user.group_name : ''}</span>
          </div>
          <button class="app-header__logout" onclick="App.doLogout()" title="ログアウト">⏻</button>
        </header>
        <nav class="app-nav" id="app-nav"></nav>
        <main class="app-main">
          <div id="global-loading" class="global-loading" style="display:none">
            <div class="spinner"></div>
          </div>
          <div id="page-content"></div>
        </main>
      </div>`;

    this._renderNav(role);
    this._navigateDefault(role);
  },

  _renderNav(role) {
    const tabs = {
      user:   [
        { id: 'top',     icon: '🛒', label: '商品' },
        { id: 'active',  icon: '📋', label: '取引中' },
        { id: 'history', icon: '📦', label: '履歴' },
        { id: 'mypage',  icon: '👤', label: 'マイページ' },
      ],
      admin: [
        { id: 'home',    icon: '🏠', label: 'ホーム' },
        { id: 'trade',   icon: '📋', label: '取引' },
        { id: 'product', icon: '📦', label: '商品' },
        { id: 'users',   icon: '👥', label: 'ユーザー' },
      ],
      leader: [
        { id: 'price',  icon: '💰', label: '価格' },
        { id: 'status', icon: '📊', label: '状況' },
        { id: 'order',  icon: '📋', label: '注文' },
        { id: 'return', icon: '↩️', label: 'お戻し' },
      ],
    };
    const items = tabs[role] || tabs.user;
    $('#app-nav').innerHTML = items.map(t =>
      `<button class="nav-tab" data-page="${t.id}" onclick="App.navigate('${t.id}')">
        <span class="nav-tab__icon">${t.icon}</span>
        <span class="nav-tab__label">${t.label}</span>
      </button>`
    ).join('');
  },

  _navigateDefault(role) {
    const defaults = { user: 'top', admin: 'home', leader: 'price' };
    this.navigate(defaults[role] || 'top');
  },

  navigate(pageId) {
    this.currentPage = pageId;
    $$('.nav-tab').forEach(t => t.classList.toggle('nav-tab--active', t.dataset.page === pageId));
    this.renderPage();
  },

  async renderPage(opts = {}) {
    const role = Auth.getRole();
    const pageId = this.currentPage;
    const container = $('#page-content');
    if (!container) return;

    if (!opts.soft) container.innerHTML = UI.skeleton(5);

    try {
      let html = '';
      if (role === 'user') {
        switch (pageId) {
          case 'top':      html = await UserPages.renderTop(); break;
          case 'detail':   html = await UserPages.renderDetail(); break;
          case 'purchase': html = await UserPages.renderPurchase(); break;
          case 'return':   html = await UserPages.renderReturn(); break;
          case 'active':   html = await UserPages.renderActive(); break;
          case 'history':  html = await UserPages.renderHistory(); break;
          case 'mypage':   html = await UserPages.renderMyPage(); break;
          default: html = UI.empty('ページが見つかりません');
        }
      } else if (role === 'admin') {
        switch (pageId) {
          case 'home':           html = await AdminPages.renderHome(); break;
          case 'trade':          html = await AdminPages.renderTrade(); break;
          case 'order-detail':   html = await AdminPages.renderOrderDetail(); break;
          case 'product':        html = await AdminPages.renderProducts(); break;
          case 'product-edit':   html = await AdminPages.renderProductEdit(); break;
          case 'users':          html = await AdminPages.renderUsers(); break;
          case 'user-edit':      html = await AdminPages.renderUserEdit(); break;
          case 'settings':       html = await AdminPages.renderSettings(); break;
          default: html = UI.empty('ページが見つかりません');
        }
      } else if (role === 'leader') {
        switch (pageId) {
          case 'price':  html = await LeaderPages.renderPricing(); break;
          case 'status': html = await LeaderPages.renderStatus(); break;
          case 'order':  html = await LeaderPages.renderOrders(); break;
          case 'return': html = await LeaderPages.renderReturns(); break;
          default: html = UI.empty('ページが見つかりません');
        }
      }
      container.innerHTML = `<div class="page-content">${html}</div>`;
    } catch (err) {
      console.error('Render error:', err);
      container.innerHTML = `<div class="page-content">${UI.card(`
        <div class="text-center">
          <div class="text-red font-bold mb-05">読み込みに失敗しました</div>
          <p class="text-sm text-gray">${err.message}</p>
          <button class="btn btn--primary btn--sm mt-1" onclick="App.renderPage()">再試行</button>
        </div>
      `)}</div>`;
    }
  },
};
// DOMContentLoaded is added by build script

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
